<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
        <link rel="stylesheet" type="text/css" href="assets/css/reset.css"/>
        <link rel="stylesheet" type="text/css" href="assets/css/eployeeScreen.css"/>
        <link rel="stylesheet" type="text/css" href="assets/fonts/Outfit/outfit.css"/>
        <link rel="stylesheet" type="text/css" href="assets/css/responsive.employeeScreen.css"/>
        
        <title>Pantalla-empleado</title>
        
        <script src="/socket.io/socket.io.js"></script>
        <script type="text/javascript" src="assets/js/employeeScreen.js" type="module"></script>
        
    </head>

    <body>
        <header class="restaurant-header">
            <div class="header__elAguacate-container">
                <img class="header__img" src="assets/img/2025-07-09 21_14_07-Facebook — Mozilla Firefox.png"/>
            </div>
        </header>

        <div class="softappetit-container">
            <img class="softappetit__img" src="assets/img/unnamed.png"/>
        </div>

        <div class="backgroud-window__zone hidthis" id="backgroudZone">

            <div class="selected-option__window hidthis" id="cautionWindow">
                <div class="window__caoution">
                    <img class="caution__img" src="assets/img/[CITYPNG.COM]Warning Caution Triangle Mark Black Icon FREE PNG - 1500x1500.png"/>
                </div>
                <div class="caution__message"><h2 id="caution-message"></h2></div>
                <div class="caution__no-btn" id="caution-cancel">No</div>
            </div>

            <div class="selected-option__confirmation hidthis" id="windowConfirmation">
                <div class="selected-option__icon-wrap">
                    <img class="selected-option__icon" src="assets/img/favpng_714583ca183e15e3ab76a7e70b5cfc1b.png"/>
                </div>
                <div class="confirm__message"><h2 id="confirm__message"></h2></div>
                <div class="confirm__btn" id="confirm-btn">OK</div>
            </div>

        </div>

        <main class="order-screen">
            <div class="order__comanda-screen">
                <div class="comanda-screen__header"><span class="comanda-screen__title">En proceso</span></div>
                <!--Etiqueta de proceso-->
                
                <div class="comanda-screen__comanda-id-wrapper" id="screen1"></div>
            </div>

            <div class="order__finish-screen">
                <div class="finish-screen__header"><span class="finish-screen__title">Terminado</span></div>
                <!--Etiqueta de Terminado-->
                
                <div class="finish-screen__finish-id-wrapper" id="screen2"></div>
            </div>
        </main>
    </body>
    
</html>
